services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-linuxlab_root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-linuxlab}
      MARIADB_USER: ${MARIADB_USER:-linuxlab}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-linuxlab_pass}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    network_mode: host
    environment:
      DATABASE_URL: mysql+aiomysql://${MARIADB_USER:-linuxlab}:${MARIADB_PASSWORD:-linuxlab_pass}@127.0.0.1:3306/${MARIADB_DATABASE:-linuxlab}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: '["http://localhost", "https://localhost"]'
    user: "1000"
    group_add:
      - "982"
    cap_add:
      - NET_ADMIN
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /var/run/libvirt/libvirt-sock:/var/run/libvirt/libvirt-sock:rw
      - /etc/os-release:/host-os-release:ro
      - /home/ubuntu/.ssh:/app/.ssh:ro
      - /var/lib/libvirt/images:/var/lib/libvirt/images:rw
    restart: unless-stopped

volumes:
  db_data:
